<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>사과 분석 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://ai-public.creatie.ai/gen_page/tailwind-custom.css" rel="stylesheet">    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
    <script src="https://cdn.tailwindcss.com/3.4.5?plugins=forms@0.5.7,typography@0.5.13,aspect-ratio@0.4.2,container-queries@0.1.1"></script>
    <script src="https://ai-public.creatie.ai/gen_page/tailwind-config.min.js" data-color="#FF6B6B" data-border-radius='small'></script>
</head>
<body class="bg-gray-50 font-sans">
    <div class="max-w-8xl mx-auto px-4 py-8">
        <div class="bg-white rounded-lg shadow-sm p-8">            <div class="grid grid-cols-1 gap-8">
                <div class="text-center">
                    <div class="w-96 h-96 mx-auto mb-6 bg-gray-100 rounded-lg overflow-hidden">                        <img src="https://creatie.ai/ai/api/search-image?query=A high-quality, photorealistic image of a fresh red apple on a clean white background. The apple should appear perfectly ripe, with a rich red color and subtle highlights that suggest its smooth, waxy surface. The lighting should be soft and even, creating gentle shadows that emphasize the apple's form.&width=800&height=800&orientation=squarish&flag=fe1254bf-0f7a-4992-9409-95622448c372" class="w-full h-full object-cover" alt="사과 이미지">                    </div>
                    <div class="bg-blue-50 rounded-lg p-6 max-w-2xl mx-auto">
                        <div class="grid grid-cols-4 gap-4 text-center">                            <div>
                                <p class="text-gray-600 text-sm">분석된 사과</p>
                                <p class="text-2xl font-bold text-gray-800">1개</p>
                            </div>
                            <div>
                                <p class="text-gray-600 text-sm">숙성도</p>
                                <p class="text-2xl font-bold text-custom">75%</p>
                            </div>                            <div>
                                <p class="text-gray-600 text-sm">품질</p>
                                <p class="text-2xl font-bold text-green-600">80/100</p>
                            </div>
                            <div>
                                <p class="text-gray-600 text-sm">예상 무게</p>
                                <p class="text-2xl font-bold text-gray-800">200g</p>
                            </div>                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-8">                    <div class="bg-white rounded-lg p-6">
                        <div id="gaugeChart1" class="w-full h-64"></div>                        <div id="gaugeChart2" class="w-full h-64"></div>
                    </div>
                    <div class="bg-white rounded-lg p-6">                        <div id="pieChart" class="w-full h-64 mb-8"></div>
                        <div class="text-center">
                            <p class="text-4xl font-bold text-gray-800 mb-2">200g</p>
                            <p class="text-gray-600">평균 크기의 고품질 사과</p>
                            <i class="fas fa-apple-alt text-custom text-3xl mt-4"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>    <script>
        const gaugeChart1 = echarts.init(document.getElementById('gaugeChart1'));
        const gaugeChart2 = echarts.init(document.getElementById('gaugeChart2'));
        const pieChart = echarts.init(document.getElementById('pieChart'));

        const gaugeOption1 = {
            animation: false,
            series: [{
                type: 'gauge',
                startAngle: 180,
                endAngle: 0,
                min: 0,
                max: 100,
                splitNumber: 10,
                axisLine: {
                    lineStyle: {
                        width: 30,
                        color: [[0.75, '#FFB74D'], [1, '#E0E0E0']]
                    }
                },
                pointer: {
                    itemStyle: {
                        color: 'auto'
                    }
                },
                axisTick: {
                    distance: -30,
                    length: 8,
                    lineStyle: {
                        color: '#fff',
                        width: 2
                    }
                },
                splitLine: {
                    distance: -30,
                    length: 30,
                    lineStyle: {
                        color: '#fff',
                        width: 4
                    }
                },
                axisLabel: {
                    color: '#999',
                    distance: -40,
                    fontSize: 14
                },
                detail: {
                    valueAnimation: true,
                    formatter: '{value}%',
                    color: 'auto',
                    fontSize: 24
                },
                data: [{
                    value: 75,
                    name: '숙성도'
                }]
            }]
        };

        const gaugeOption2 = {
            animation: false,
            series: [{
                type: 'gauge',
                startAngle: 180,
                endAngle: 0,
                min: 0,
                max: 100,
                splitNumber: 10,
                axisLine: {
                    lineStyle: {
                        width: 30,
                        color: [[0.8, '#4CAF50'], [1, '#E0E0E0']]
                    }
                },
                pointer: {
                    itemStyle: {
                        color: 'auto'
                    }
                },
                axisTick: {
                    distance: -30,
                    length: 8,
                    lineStyle: {
                        color: '#fff',
                        width: 2
                    }
                },
                splitLine: {
                    distance: -30,
                    length: 30,
                    lineStyle: {
                        color: '#fff',
                        width: 4
                    }
                },
                axisLabel: {
                    color: '#999',
                    distance: -40,
                    fontSize: 14
                },
                detail: {
                    valueAnimation: true,
                    formatter: '{value}/100',
                    color: 'auto',
                    fontSize: 24
                },
                data: [{
                    value: 80,
                    name: '품질'
                }]
            }]
        };

        const pieOption = {
            animation: false,
            tooltip: {
                trigger: 'item'
            },
            series: [{
                name: '색상 분포',
                type: 'pie',
                radius: ['40%', '70%'],
                avoidLabelOverlap: false,
                itemStyle: {
                    borderRadius: 10,
                    borderColor: '#fff',
                    borderWidth: 2
                },
                label: {
                    show: true,
                    formatter: '{b}: {c}%'
                },
                data: [
                    { value: 70, name: '빨강', itemStyle: { color: '#FF4444' } },
                    { value: 20, name: '갈색', itemStyle: { color: '#8B4513' } },
                    { value: 10, name: '초록', itemStyle: { color: '#4CAF50' } }
                ]
            }]
        };

        gaugeChart1.setOption(gaugeOption1);
        gaugeChart2.setOption(gaugeOption2);
        pieChart.setOption(pieOption);

        window.addEventListener('resize', function() {
            gaugeChart1.resize();
            gaugeChart2.resize();
            pieChart.resize();
        });
    </script></body>
</html>
